name: Build Ultimate Cat Clicker APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Create package.json with Capacitor
      run: |
        echo '{
          "name": "ultimate-cat-clicker", 
          "version": "1.0.0",
          "scripts": {
            "build": "echo \"Building Ultimate Cat Clicker...\""
          },
          "devDependencies": {
            "@capacitor/cli": "^5.0.0",
            "@capacitor/android": "^5.0.0"
          }
        }' > package.json
        
    - name: Generate package-lock.json
      run: npm install --package-lock-only
      
    - name: Install Capacitor
      run: npm install
      
    - name: Initialize Capacitor
      run: |
        npx cap init "Ultimate Cat Clicker" "com.justchris.ucc" --web-dir www
        npx cap add android
        
    - name: Copy web assets
      run: npx cap copy android
      
    - name: Use ucc-icon.png as app icon
      run: |
        if [ -f "ucc-icon.png" ]; then
          echo "🎨 Found ucc-icon.png - setting as app icon!"
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          # Copy to all density folders (Android will handle scaling)
          cp ucc-icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp ucc-icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp ucc-icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp ucc-icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp ucc-icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp ucc-icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp ucc-icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp ucc-icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp ucc-icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp ucc-icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          
          echo "✅ Icon set successfully!"
        else
          echo "⚠️  ucc-icon.png not found - using default Capacitor icon"
        fi
        
    - name: Build Android APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ultimate-cat-clicker-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
