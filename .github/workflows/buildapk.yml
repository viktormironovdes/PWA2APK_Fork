name: Build PhytoNote APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Create Capacitor project
      run: |
        echo '{
          "name": "PhytoNote",
          "version": "1.0.0",
          "scripts": {
            "build": "echo \"Building PhytoNote...\""
          },
          "devDependencies": {
            "@capacitor/cli": "^6.0.0",
            "@capacitor/android": "^6.0.0"
          }
        }' > package.json

    - name: Install dependencies
      run: npm install

    - name: Initialize Capacitor
      run: |
        npx cap init "PhytoNote" "com.phytonote.app" --web-dir www
        npx cap add android

    - name: Update Android SDK and fix resources
      run: |
        cd android
        # 1. Создаём недостающие цвета в ресурсах
        mkdir -p app/src/main/res/values
        cat > app/src/main/res/values/colors.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="colorPrimary">#1e3a1e</color>
            <color name="colorPrimaryDark">#1e3a1e</color>
            <color name="colorAccent">#3a7a3a</color>
        </resources>
        EOF

        # 2. Переписываем build.gradle с правильной настройкой namespace
        cat > app/build.gradle << 'EOF'
        apply plugin: 'com.android.application'
        android {
            namespace "com.phytonote.app"
            compileSdkVersion 35
            defaultConfig {
                applicationId "com.phytonote.app"
                minSdkVersion 23
                targetSdkVersion 35
                versionCode 1
                versionName "1.0"
                testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
            }
            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                }
            }
        }
        repositories {
            google()
            mavenCentral()
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.2.0'
            testImplementation 'junit:junit:4.13.2'
            androidTestImplementation 'androidx.test.ext:junit:1.2.1'
            androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
        }
        EOF

        # 3. ИСПРАВЛЯЕМ: Обновляем существующий styles.xml вместо создания themes.xml
        cat > app/src/main/res/values/styles.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                <item name="colorPrimary">@color/colorPrimary</item>
                <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                <item name="colorAccent">@color/colorAccent</item>
            </style>
        </resources>
        EOF

    - name: Copy web assets
      run: |
        mkdir -p www
        cp -r assets/* www/
        echo "✅ All files copied to www!"

    - name: Use custom icon as app icon
      run: |
        if [ -f "assets/icon-192.png" ]; then
          echo "🎨 Found icon-192.png - setting as app icon!"
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          cp assets/icon-192.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          echo "✅ Icon set successfully!"
        else
          echo "⚠️  icon-192.png not found - using default Capacitor icon"
        fi

    - name: Build Android APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: phytonote-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
